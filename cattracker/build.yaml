---
# Official Home Assistant Debian images (glibc + apt). Supervisor often injects Alpine
# for generic bases; these force Debian so apt-get in the Dockerfile works.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
args: {}
